<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loading… - MovieZone</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #0f0f0f;
    color: #e5e5e5;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }

  header {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo span { color: #f5b50a; }
  nav ul { list-style: none; display: flex; gap: 28px; }
  nav a {
    color: #ccc;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }
  nav a:hover { color: #f5b50a; }
  .btn-login {
    background: #f5b50a;
    color: #000;
    border: none;
    padding: 8px 18px;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }

  .breadcrumb {
    padding: 18px 40px 0;
    font-size: 13px;
    color: #888;
  }
  .breadcrumb a { color: #f5b50a; }
  .breadcrumb a:hover { text-decoration: underline; }

  .player-wrap {
    max-width: 1200px;
    margin: 20px auto;
    padding: 0 40px;
  }

  /* Video player placeholder */
  .player {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.6);
  }
  .player-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(20px) brightness(0.35);
    transform: scale(1.1);
  }
  .player-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 30px;
  }

  /* Infinite loading state */
  .spinner {
    width: 64px;
    height: 64px;
    border: 4px solid rgba(245, 181, 10, 0.15);
    border-top-color: #f5b50a;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 22px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    color: #eee;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }
  .loading-sub {
    color: #888;
    font-size: 12px;
    margin-bottom: 22px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.5px;
  }
  .loading-bar {
    width: min(420px, 80%);
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .loading-bar::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, #f5b50a, transparent);
    animation: slide 1.6s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
  .player-hint {
    color: #888;
    font-size: 12px;
    margin-top: 22px;
    letter-spacing: 0.3px;
  }

  /* Server picker (below the player) */
  .server-bar {
    max-width: 1200px;
    margin: 14px auto 0;
    padding: 0 40px;
  }
  .server-bar-inner {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .server-bar-label {
    color: #888;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .server-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
  }
  .server-tab {
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    color: #ccc;
    padding: 8px 16px;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }
  .server-tab:hover {
    border-color: #555;
    color: #fff;
  }
  .server-tab.active {
    background: #f5b50a;
    color: #000;
    border-color: #f5b50a;
    box-shadow: 0 0 0 1px #f5b50a inset;
  }
  .server-tab.active:hover { background: #ffc933; color: #000; }
  .server-tab .dot-indicator {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #666;
  }
  .server-tab.active .dot-indicator {
    background: #000;
    box-shadow: 0 0 0 2px rgba(0,0,0,0.2);
  }

  /* Movie info section */
  .info-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 40px 50px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 30px;
  }
  .info-poster {
    width: 100%;
    aspect-ratio: 2/3;
    border-radius: 8px;
    object-fit: cover;
    background: #2a2a2a;
  }
  .info-body h1 {
    font-size: 32px;
    color: #fff;
    margin-bottom: 10px;
    font-weight: 800;
  }
  .info-meta {
    display: flex;
    gap: 14px;
    color: #aaa;
    font-size: 13px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .rating-pill { color: #f5b50a; font-weight: 600; }
  .quality-pill {
    background: #e50914;
    color: #fff;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 700;
    font-size: 11px;
  }
  .info-genres {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .info-genres span {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #ccc;
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 12px;
  }
  .info-desc {
    color: #bbb;
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 24px;
  }
  .info-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .action-btn {
    background: transparent;
    color: #ccc;
    border: 1px solid #444;
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .action-btn:hover { border-color: #f5b50a; color: #f5b50a; }

  /* Related */
  .related-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 50px;
  }
  .related-wrap h2 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    border-left: 3px solid #f5b50a;
    padding-left: 12px;
    margin-bottom: 22px;
  }
  .related-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .related-card {
    background: #1a1a1a;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s;
    display: block;
  }
  .related-card:hover { transform: translateY(-3px); }
  .related-card img {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
  }
  .related-card .title-line {
    padding: 8px 10px 10px;
    font-size: 13px;
    color: #fff;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  footer {
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    padding: 30px 40px;
    text-align: center;
    color: #666;
    font-size: 13px;
  }

  .not-found {
    text-align: center;
    padding: 100px 20px;
    color: #aaa;
  }
  .not-found h1 { color: #fff; font-size: 28px; margin-bottom: 10px; }
  .not-found a { color: #f5b50a; text-decoration: underline; }

  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    nav { display: none; }
    .breadcrumb { padding: 14px 16px 0; }
    .player-wrap { padding: 0 16px; margin: 14px auto; }
    .info-wrap {
      grid-template-columns: 1fr;
      padding: 24px 16px 40px;
    }
    .info-poster { max-width: 200px; margin: 0 auto; }
    .info-body h1 { font-size: 24px; text-align: center; }
    .info-meta { justify-content: center; }
    .info-genres { justify-content: center; }
    .info-actions { justify-content: center; }
    .related-wrap { padding: 0 16px 40px; }
    .related-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .play-btn { width: 70px; height: 70px; }
    .play-btn svg { width: 28px; height: 28px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">Movie<span>Zone</span></a>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html">Movies</a></li>
      <li><a href="index.html">TV Shows</a></li>
      <li><a href="index.html">Top IMDB</a></li>
    </ul>
  </nav>
  <button class="btn-login">Login</button>
</header>

<main id="content"><!-- filled by JS --></main>

<footer>
  <p>&copy; 2026 MovieZone. This is a demo site. No real streaming content.</p>
</footer>

<script src="catalog.js"></script>
<script>
  const SERVERS = [
    { id: 1, label: 'US' },
    { id: 2, label: 'EU' },
    { id: 3, label: 'Backup' },
  ];

  function getQueryId() {
    const params = new URLSearchParams(window.location.search);
    return parseInt(params.get('id'), 10);
  }

  function getActiveServer() {
    const params = new URLSearchParams(window.location.search);
    const s = parseInt(params.get('server'), 10);
    return SERVERS.some(x => x.id === s) ? s : 1;
  }

  const activeServer = getActiveServer();

  function renderNotFound() {
    document.getElementById('content').innerHTML = `
      <div class="not-found">
        <h1>Movie not found</h1>
        <p>We couldn't find that title. <a href="index.html">Back to home</a></p>
      </div>`;
  }

  function renderMovie(m) {
    document.title = `${m.title} (${m.year}) - MovieZone`;

    const related = catalog
      .filter(x => x.id !== m.id && x.genres.some(g => m.genres.includes(g)))
      .slice(0, 6);

    document.getElementById('content').innerHTML = `
      <div class="breadcrumb">
        <a href="index.html">Home</a> / <a href="index.html">${m.kind === 'tv' ? 'TV Shows' : 'Movies'}</a> / ${m.title}
      </div>

      <div class="player-wrap">
        <div class="player" id="player">
          <div class="player-bg" style="background-image:url('${posterFor(m)}')"></div>
          <div class="player-overlay">
            <div class="spinner"></div>
            <div class="loading-text">Loading stream…</div>
            <div class="loading-sub">Connecting to Server ${activeServer} • ${m.quality}</div>
            <div class="loading-bar"></div>
            <div class="player-hint">${m.title} (${m.year}) • ${m.duration}</div>
          </div>
        </div>
      </div>

      <div class="server-bar">
        <div class="server-bar-inner">
          <div class="server-bar-label">Streaming Server:</div>
          <div class="server-tabs">
            ${SERVERS.map(s => `
              <a class="server-tab ${s.id === activeServer ? 'active' : ''}"
                 href="watch.html?id=${m.id}&server=${s.id}">
                <span class="dot-indicator"></span>
                Server ${s.id} <span style="opacity:0.7;font-weight:500">(${s.label})</span>
              </a>
            `).join('')}
          </div>
        </div>
      </div>

      <div class="info-wrap">
        <img class="info-poster" src="${posterFor(m)}" alt="${m.title}"
             onerror="this.onerror=null;this.src=window.placeholderPoster(${JSON.stringify(m.title)})" />
        <div class="info-body">
          <h1>${m.title}</h1>
          <div class="info-meta">
            <span>${m.year}</span>
            <span class="rating-pill">★ ${m.rating}</span>
            <span>${m.duration}</span>
            <span class="quality-pill">${m.quality}</span>
          </div>
          <div class="info-genres">${m.genres.map(g => `<span>${g}</span>`).join('')}</div>
          <p class="info-desc">${m.desc}</p>
          <div class="info-actions">
            <button class="action-btn">+ Watchlist</button>
            <button class="action-btn">↗ Share</button>
            <button class="action-btn">⚑ Report Issue</button>
          </div>
        </div>
      </div>

      ${related.length ? `
      <div class="related-wrap">
        <h2>You may also like</h2>
        <div class="related-grid">
          ${related.map(r => `
            <a class="related-card" href="watch.html?id=${r.id}">
              <img src="${posterFor(r)}" alt="${r.title}" loading="lazy"
                   onerror="this.onerror=null;this.src=window.placeholderPoster(${JSON.stringify(r.title)})" />
              <div class="title-line">${r.title}</div>
            </a>
          `).join('')}
        </div>
      </div>` : ''}
    `;
  }

  const id = getQueryId();
  const movie = catalog.find(m => m.id === id);
  if (movie) renderMovie(movie);
  else renderNotFound();
</script>

</body>
</html>
