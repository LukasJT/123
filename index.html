<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MovieZone - Watch Free Movies Online</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #0f0f0f;
    color: #e5e5e5;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 26px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    cursor: pointer;
  }
  .logo span { color: #f5b50a; }
  nav ul { list-style: none; display: flex; gap: 28px; }
  nav a {
    color: #ccc;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
  }
  nav a:hover { color: #f5b50a; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .btn-login {
    background: #f5b50a;
    color: #000;
    border: none;
    padding: 8px 18px;
    border-radius: 4px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-login:hover { background: #ffc933; }

  .hero {
    background: linear-gradient(rgba(0,0,0,0.7), rgba(15,15,15,1)),
      radial-gradient(circle at 30% 50%, #2a1810, #0f0f0f);
    padding: 90px 20px 70px;
    text-align: center;
  }
  .hero h1 { font-size: 44px; font-weight: 800; margin-bottom: 12px; color: #fff; }
  .hero p { font-size: 16px; color: #aaa; margin-bottom: 36px; }
  .search-box {
    max-width: 700px;
    margin: 0 auto;
    display: flex;
    background: #fff;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .search-box input {
    flex: 1;
    border: none;
    padding: 16px 22px;
    font-size: 15px;
    outline: none;
    color: #111;
  }
  .search-box button {
    background: #f5b50a;
    border: none;
    padding: 0 32px;
    font-weight: 700;
    font-size: 14px;
    color: #000;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .search-box button:hover { background: #ffc933; }

  .genre-bar {
    padding: 24px 40px 0;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .chip {
    background: #1a1a1a;
    color: #ccc;
    border: 1px solid #2a2a2a;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { border-color: #f5b50a; color: #f5b50a; }
  .chip.active { background: #f5b50a; color: #000; border-color: #f5b50a; }

  .section { padding: 40px 40px 20px; }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
  }
  .section-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    border-left: 3px solid #f5b50a;
    padding-left: 12px;
  }
  .section-header a {
    color: #f5b50a;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 18px;
  }
  .movie {
    background: #1a1a1a;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .movie:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(245, 181, 10, 0.2);
  }
  .poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: #2a2a2a;
    object-fit: cover;
    display: block;
  }
  .badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(245, 181, 10, 0.95);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 3px;
    z-index: 2;
  }
  .badge.new { background: #e50914; color: #fff; }
  .quality {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 3px;
    z-index: 2;
  }
  .movie-info { padding: 10px 12px 14px; }
  .movie-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .movie-meta {
    font-size: 12px;
    color: #888;
    display: flex;
    gap: 8px;
  }
  .movie-meta .dot { color: #555; }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #666;
    font-size: 14px;
  }

  footer {
    background: #1a1a1a;
    border-top: 1px solid #2a2a2a;
    padding: 30px 40px;
    margin-top: 40px;
    text-align: center;
    color: #666;
    font-size: 13px;
  }

  @media (max-width: 768px) {
    header { padding: 12px 16px; }
    nav { display: none; }
    .hero h1 { font-size: 28px; }
    .hero { padding: 60px 16px 50px; }
    .section { padding: 30px 16px 10px; }
    .genre-bar { padding: 20px 16px 0; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="resetView()">Movie<span>Zone</span></div>
  <nav>
    <ul>
      <li><a href="#" onclick="resetView();return false;">Home</a></li>
      <li><a href="#" onclick="filterSection('movie');return false;">Movies</a></li>
      <li><a href="#" onclick="filterSection('tv');return false;">TV Shows</a></li>
      <li><a href="#">Top IMDB</a></li>
      <li><a href="#">Genre</a></li>
      <li><a href="#">Country</a></li>
    </ul>
  </nav>
  <div class="header-right">
    <button class="btn-login">Login</button>
  </div>
</header>

<section class="hero">
  <h1>Watch Movies & TV Shows Online Free</h1>
  <p>Stream the latest blockbusters and classics in HD quality</p>
  <div class="search-box">
    <input type="text" id="search" placeholder="Search for movies, TV shows, actors..." autocomplete="off" />
    <button onclick="doSearch()">SEARCH</button>
  </div>
</section>

<div class="genre-bar" id="genreBar"></div>

<main id="main"></main>

<footer>
  <p>&copy; 2026 MovieZone. This is a demo site. No real streaming content.</p>
</footer>

<script src="catalog.js"></script>
<script>
  const allGenres = ['All', ...Array.from(new Set(catalog.flatMap(m => m.genres))).sort()];

  let activeGenre = 'All';
  let activeQuery = '';
  let kindFilter = null;

  function makeCard(m) {
    const badgeHtml = m.badge
      ? `<div class="badge ${m.badge === 'NEW' ? 'new' : ''}">${m.badge}</div>`
      : '';
    return `
      <a class="movie" href="watch.html?id=${m.id}">
        ${badgeHtml}
        <div class="quality">${m.quality}</div>
        <img class="poster" src="${posterFor(m)}" alt="${m.title}" loading="lazy"
             onerror="this.onerror=null;this.src=window.placeholderPoster(${JSON.stringify(m.title)})" />
        <div class="movie-info">
          <div class="movie-title">${m.title}</div>
          <div class="movie-meta">
            <span>${m.year}</span>
            <span class="dot">•</span>
            <span>★ ${m.rating}</span>
          </div>
        </div>
      </a>`;
  }

  function matches(m) {
    if (kindFilter && m.kind !== kindFilter) return false;
    if (activeGenre !== 'All' && !m.genres.includes(activeGenre)) return false;
    if (activeQuery) {
      const q = activeQuery.toLowerCase();
      if (!m.title.toLowerCase().includes(q) &&
          !m.genres.some(g => g.toLowerCase().includes(q))) return false;
    }
    return true;
  }

  function renderGenres() {
    document.getElementById('genreBar').innerHTML = allGenres.map(g =>
      `<div class="chip ${g === activeGenre ? 'active' : ''}" onclick="setGenre('${g}')">${g}</div>`
    ).join('');
  }

  function renderMain() {
    const main = document.getElementById('main');

    if (activeQuery || activeGenre !== 'All' || kindFilter) {
      const results = catalog.filter(matches);
      const label = activeQuery
        ? `Search: "${activeQuery}"`
        : kindFilter === 'tv' ? 'All TV Shows'
        : kindFilter === 'movie' ? 'All Movies'
        : `Genre: ${activeGenre}`;
      main.innerHTML = `
        <section class="section">
          <div class="section-header">
            <h2>${label} <span style="color:#666;font-size:14px;font-weight:400;margin-left:8px">${results.length} result${results.length===1?'':'s'}</span></h2>
            <a href="#" onclick="resetView();return false;">Clear filter ×</a>
          </div>
          <div class="grid">
            ${results.length ? results.map(makeCard).join('') : '<div class="empty">No results. Try a different search or genre.</div>'}
          </div>
        </section>`;
      return;
    }

    main.innerHTML = sections.map(s => {
      const items = catalog.filter(m => m.section === s.id);
      return `
        <section class="section">
          <div class="section-header">
            <h2>${s.title}</h2>
            <a href="#">View all →</a>
          </div>
          <div class="grid">${items.map(makeCard).join('')}</div>
        </section>`;
    }).join('');
  }

  function setGenre(g) {
    activeGenre = g;
    renderGenres();
    renderMain();
    window.scrollTo({ top: document.querySelector('.genre-bar').offsetTop - 80, behavior: 'smooth' });
  }

  function doSearch() {
    const q = document.getElementById('search').value.trim();
    if (!q) return;
    window.location.href = 'search.html?q=' + encodeURIComponent(q);
  }

  function filterSection(kind) {
    kindFilter = kind;
    activeQuery = '';
    document.getElementById('search').value = '';
    renderMain();
  }

  function resetView() {
    activeGenre = 'All';
    activeQuery = '';
    kindFilter = null;
    document.getElementById('search').value = '';
    renderGenres();
    renderMain();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('search').addEventListener('keypress', e => {
    if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
  });

  renderGenres();
  renderMain();
</script>

</body>
</html>
