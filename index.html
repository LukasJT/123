  const sections = [
    { id:'trending', title:'Trending Now' },
    { id:'recent', title:'Recently Added' },
    { id:'shows', title:'Popular TV Shows' },
    { id:'top', title:'Top IMDB' },
    { id:'action', title:'Action & Adventure' },
    { id:'horror', title:'Horror & Thriller' },
    { id:'comedy', title:'Comedy' },
    { id:'anime', title:'Animation' },
  ];

  const allGenres = ['All', ...Array.from(new Set(catalog.flatMap(m => m.genres))).sort()];

  let activeGenre = 'All';
  let activeQuery = '';
  let kindFilter = null;

  function makeCard(m) {
    const badgeHtml = m.badge
      ? `<div class="badge ${m.badge === 'NEW' ? 'new' : ''}">${m.badge}</div>`
      : '';
    return `
      <div class="movie" onclick="openModal(${m.id})">
        ${badgeHtml}
        <div class="quality">${m.quality}</div>
        <img class="poster" src="${m.poster}" alt="${m.title}" loading="lazy"
             onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 300%22><rect width=%22200%22 height=%22300%22 fill=%22%23222%22/><text x=%22100%22 y=%22150%22 fill=%22%23888%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2214%22>No Image</text></svg>'" />
        <div class="movie-info">
          <div class="movie-title">${m.title}</div>
          <div class="movie-meta">
            <span>${m.year}</span>
            <span class="dot">•</span>
            <span>★ ${m.rating}</span>
          </div>
        </div>
      </div>`;
  }

  function matches(m) {
    if (kindFilter && m.kind !== kindFilter) return false;
    if (activeGenre !== 'All' && !m.genres.includes(activeGenre)) return false;
    if (activeQuery) {
      const q = activeQuery.toLowerCase();
      if (!m.title.toLowerCase().includes(q) &&
          !m.genres.some(g => g.toLowerCase().includes(q))) return false;
    }
    return true;
  }

  function renderGenres() {
    document.getElementById('genreBar').innerHTML = allGenres.map(g =>
      `<div class="chip ${g === activeGenre ? 'active' : ''}" onclick="setGenre('${g}')">${g}</div>`
    ).join('');
  }

  function renderMain() {
    const main = document.getElementById('main');

    // If searching or genre filtered, show one combined "Results" section
    if (activeQuery || activeGenre !== 'All' || kindFilter) {
      const results = catalog.filter(matches);
      const label = activeQuery
        ? `Search: "${activeQuery}"`
        : kindFilter === 'tv' ? 'All TV Shows'
        : kindFilter === 'movie' ? 'All Movies'
        : `Genre: ${activeGenre}`;
      main.innerHTML = `
        <section class="section">
          <div class="section-header">
            <h2>${label} <span style="color:#666;font-size:14px;font-weight:400;margin-left:8px">${results.length} result${results.length===1?'':'s'}</span></h2>
            <a href="#" onclick="resetView();return false;">Clear filter ×</a>
          </div>
          <div class="grid">
            ${results.length ? results.map(makeCard).join('') : '<div class="empty">No results. Try a different search or genre.</div>'}
          </div>
        </section>`;
      return;
    }

    main.innerHTML = sections.map(s => {
      const items = catalog.filter(m => m.section === s.id);
      return `
        <section class="section">
          <div class="section-header">
            <h2>${s.title}</h2>
            <a href="#">View all →</a>
          </div>
          <div class="grid">${items.map(makeCard).join('')}</div>
        </section>`;
    }).join('');
  }

  function setGenre(g) {
    activeGenre = g;
    renderGenres();
    renderMain();
    window.scrollTo({ top: document.querySelector('.genre-bar').offsetTop - 80, behavior: 'smooth' });
  }

  function doSearch() {
    activeQuery = document.getElementById('search').value.trim();
    renderMain();
    if (activeQuery) {
      window.scrollTo({ top: document.getElementById('main').offsetTop - 20, behavior: 'smooth' });
    }
  }

  function filterSection(kind) {
    kindFilter = kind;
    activeQuery = '';
    document.getElementById('search').value = '';
    renderMain();
  }

  function resetView() {
    activeGenre = 'All';
    activeQuery = '';
    kindFilter = null;
    document.getElementById('search').value = '';
    renderGenres();
    renderMain();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function openModal(id) {
    const m = catalog.find(x => x.id === id);
    if (!m) return;
    document.getElementById('mPoster').src = m.poster;
    document.getElementById('mTitle').textContent = m.title;
    document.getElementById('mYear').textContent = m.year;
    document.getElementById('mRating').textContent = '★ ' + m.rating;
    document.getElementById('mDuration').textContent = m.duration;
    document.getElementById('mQuality').textContent = m.quality;
    document.getElementById('mGenres').innerHTML = m.genres.map(g => `<span>${g}</span>`).join('');
    document.getElementById('mDesc').textContent = m.desc;
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function fakePlay() {
    alert("This is a demo site — no real video playback.");
  }

  document.getElementById('search').addEventListener('input', () => {
    activeQuery = document.getElementById('search').value.trim();
    renderMain();
  });
  document.getElementById('search').addEventListener('keypress', e => {
    if (e.key === 'Enter') doSearch();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  renderGenres();
  renderMain();
</script>
